name: CI

on:
  push:
    branches: ['**']
    paths-ignore:
      - 'README.md'
      - 'USER_GUIDE.md'
      - 'docs/**'
  pull_request:
    branches: ['**']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Unit Tests (macOS)
    runs-on: macos-26
    timeout-minutes: 30

    env:
      SCHEME: Neutral Zone Trap
      UNIT_TEST_TARGET: Neutral Zone TrapTests
      DESTINATION: platform=macOS

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          # Prefer an Xcode 26.x install if present, fall back to default
          XCODE_PATH=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH="/Applications/Xcode.app"
          fi
          echo "Selecting: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build for testing
        run: |
          set -o pipefail
          xcodebuild \
            -project "Neutral Zone Trap.xcodeproj" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination "$DESTINATION" \
            -only-testing:"$UNIT_TEST_TARGET" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build-for-testing

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild \
            -project "Neutral Zone Trap.xcodeproj" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination "$DESTINATION" \
            -only-testing:"$UNIT_TEST_TARGET" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            test-without-building
